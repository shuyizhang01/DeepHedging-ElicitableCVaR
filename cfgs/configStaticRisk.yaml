# =============================================================================
# configStaticRisk.yaml
# Hyperparameters for the static-risk (CVaR terminal loss) hedging experiment.
# =============================================================================

# ---------------------------------------------------------------------------
# Market / data
# ---------------------------------------------------------------------------
market:
  tickers:
    JPM: JPM
    BAC: BAC
    WFC: WFC
    C:   C
  years_back: 2
  end_date: "2025-12-20"
  r_daily: 0.000158730     # 0.04 / 252

# ---------------------------------------------------------------------------
# GARCH parameters (Heston-Nandi, one entry per asset)
# ---------------------------------------------------------------------------
garch_params:
  0:  # JPM
    omega:           8.59e-06
    alpha:           7.04e-07
    beta:            0.8827
    gamma:           251.15
    lambda:          0.5776
    h_unconditional: 0.000118
  1:  # BAC
    omega:           5.31e-07
    alpha:           5.82e-07
    beta:            0.7465
    gamma:           650.25
    lambda:          0.1809
    h_unconditional: 0.000072
  2:  # WFC
    omega:           1.44e-06
    alpha:           1.09e-07
    beta:            0.9433
    gamma:           664.44
    lambda:          -0.1208
    h_unconditional: 0.000168
  3:  # C
    omega:           5.25e-06
    alpha:           1.11e-07
    beta:            0.9396
    gamma:           534.63
    lambda:          0.7262
    h_unconditional: 0.000184

# ---------------------------------------------------------------------------
# DCC-GARCH + copula  (pre-fitted; set to null to re-fit from data)
# ---------------------------------------------------------------------------
dcc:
  nu_Q:      4.9204
  dcc_alpha: null
  dcc_beta:  null

# ---------------------------------------------------------------------------
# Environment
# ---------------------------------------------------------------------------
env:
  K:                100.0
  T_days:           252
  S0:               [100.0, 100.0, 100.0, 100.0]
  r:                0.04
  transaction_cost: 0.0001
  basket_weights:   [0.07690456, 0.44895452, 0.26472574, 0.20941517]

# ---------------------------------------------------------------------------
# Basket option pricing model
# ---------------------------------------------------------------------------
pricing:
  system_path: "basket_system_dcc_trained.pkl"

# ---------------------------------------------------------------------------
# Actor network
# ---------------------------------------------------------------------------
actor:
  hidden_dim:  256
  action_high: 2.0

# ---------------------------------------------------------------------------
# Training
# ---------------------------------------------------------------------------
training:
  alpha:        0.925    # CVaR confidence level
  n_iter:       900
  batch_size:   2048     # evaluation batch; training inflates by 1/(1-alpha)
  lr:           5.0e-5
  log_interval: 10
  log_dir:      "logs/static"
  resume_checkpoint: null

# ---------------------------------------------------------------------------
# Misc
# ---------------------------------------------------------------------------
seed:   42
device: "cuda"
